<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Ranking irônico de amigos baseado na quantidade de filhos (incluindo pets, eletrodomésticos, plantas e outros objetos).">
  <title>Filhometria CKBence</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <main class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <span class="emoji-logo">🍼👶🚗🤖</span>
        <h1>Filhometria CKBence</h1>
        <p class="subtitle">(Pets, plantas, carros e eletrodomésticos contam!)</p>
      </div>
    </header>

    <section class="leaderboard-section">
      <div class="leaderboard-header">
        <h2>🏆 Classificação Atual</h2>
        <span class="total-stats" id="total-stats">Total de Filhos Registrados: 0</span>
      </div>

      <div id="leaderboard-list" class="leaderboard-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Carregando herdeiros...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Script -->
  <script src="script.js"></script>
</body>

</html>
